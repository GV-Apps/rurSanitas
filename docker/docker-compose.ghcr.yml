# docker-compose.ghcr.yml — Producción con imagen pre-construida desde GHCR
#
# IMAGEN: ghcr.io/<repo-owner>/git_automatizacion_rur:latest
# La construye GitHub Actions en cada push. Aquí solo se descarga y ejecuta.
#
# Uso en servidor (desde /opt/automatizacion-rur/docker/):
#   docker compose -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.ghcr.yml up -d
#
# Para ver logs:
#   docker compose -f docker-compose.ghcr.yml logs -f app
#   docker compose -f docker-compose.ghcr.yml logs -f nginx

services:

  # ── Aplicación FastAPI ───────────────────────────────────────────────────────
  app:
    # Owner del repo: JorgeTrujillo97 (quien publica la imagen en GHCR).
    # El owner lo puedes confirmar en: ghcr.io después del primer push de Actions.
    image: ghcr.io/lucho-lja/git_automatizacion_rur:latest
    restart: unless-stopped

    # Variables de entorno desde archivo local en el servidor (nunca en Git)
    env_file:
      - .env.prod

    environment:
      DEBUG: "false"
      TZ:    "America/Bogota"

    # Solo expone el puerto internamente a nginx (no al mundo)
    expose:
      - "8000"

    # Healthcheck: usa Python (ya disponible en la imagen) en lugar de curl
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Nginx (proxy reverso + SSL) ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Configuración de nginx (solo lectura)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Certificados SSL de Let's Encrypt generados con certbot en el host
      - /etc/letsencrypt:/etc/letsencrypt:ro

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
