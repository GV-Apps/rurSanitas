# docker-compose.ec2.yml — Producción en EC2, imagen construida localmente (sin ECR)
# Uso desde la raíz del repo clonado en el EC2:
#   docker compose -f docker/docker-compose.ec2.yml up -d --build
# Requiere Docker Compose v2 (plugin): sudo apt install -y docker-compose-plugin

services:
  app:
    build:
      context: ..              # raíz del repositorio
      dockerfile: docker/Dockerfile
    image: rur-app:latest      # tag local para no rebuild innecesario
    restart: unless-stopped
    env_file:
      - .env.prod              # docker/.env.prod  (NO subir a Git)
    environment:
      DEBUG: "false"
      TZ:    "America/Bogota"
    ports:
      - "8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro    # certificados Certbot
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
