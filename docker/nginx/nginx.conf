worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip compression
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream app {
        server app:8000;
    }

    # =========================================================================
    # MODO A — Dominio propio (raíz /)
    # Usar cuando este EC2 es el único destino del dominio.
    # Ejemplo: rur.midominio.com  o  dedicado.com
    # =========================================================================

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name aasctronix.com;   # ← reemplazar con el dominio real
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name aasctronix.com;   # ← reemplazar con el dominio real

        ssl_certificate     /etc/letsencrypt/live/aasctronix.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aasctronix.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options          DENY                                                    always;
        add_header X-Content-Type-Options   nosniff                                                 always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"                  always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"                       always;
        add_header Permissions-Policy       "geolocation=(), microphone=(), camera=(), payment=()"  always;

        client_max_body_size 20M;

        location /static/ {
            proxy_pass http://app;
            expires 7d;
            add_header Cache-Control             "public, immutable"                       always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"     always;
            add_header X-Content-Type-Options    nosniff                                   always;
            add_header X-Frame-Options           DENY                                      always;
            add_header Referrer-Policy           "strict-origin-when-cross-origin"         always;
        }

        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass         http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location / {
            proxy_pass         http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # =========================================================================
    # MODO B — Subpath /rur en dominio compartido
    # Usar cuando midominio.com ya existe y se quiere acceder via /rur.
    #
    # OPCIÓN B1 (recomendada): este bloque se agrega al Nginx del servidor
    # existente (el que ya sirve midominio.com). El upstream rur_app apunta
    # a la IP:puerto del EC2 donde corre este proyecto.
    #
    # OPCIÓN B2: si ambas apps corren en el mismo servidor, reemplazar
    # "rur_app_ip:8000" por "app:8000" (mismo upstream de arriba).
    # =========================================================================

    # upstream rur_app {
    #     server <IP_EC2_ESTE_PROYECTO>:8000;   # ← IP privada o pública del EC2 RUR
    # }

    # server {
    #     listen 443 ssl http2;
    #     server_name midominio.com;             # ← dominio existente
    #
    #     # — SSL ya configurado para este dominio —
    #
    #     client_max_body_size 20M;
